<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Thread Canvas · research checkpoint</title>
<style>
:root{--bg:#07101d;--bar:#0b1424;--panel:#101d32;--panel2:#0f1729;--line:#284061;--ink:#edf4ff;--muted:#9fb3d1;--accent:#8ab4ff;--green:#82e6c5;--left:44%;color-scheme:dark}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;overflow:hidden}button,a{font:inherit}.top{height:62px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--bar)}.brand{min-width:260px}.brand-title{font-weight:850}.brand-sub{font-size:12px;color:var(--muted);margin-top:2px}.toolbar{display:flex;gap:8px;align-items:center}.btn{border:1px solid #3a5a87;background:#172844;color:var(--ink);border-radius:9px;padding:7px 10px;text-decoration:none;font-size:12px}.btn.primary{border-color:#4d86c8;background:#1b4c7a}.canvas{display:grid;grid-template-columns:minmax(340px,var(--left)) 8px minmax(500px,1fr);height:calc(100vh - 62px)}.chatPane{background:#dfe6e2;min-width:0}.chatPane iframe{width:100%;height:100%;border:0;display:block}.splitter{background:#132642;border-left:1px solid #35506e;border-right:1px solid #35506e;position:relative}.splitter:after{content:"";position:absolute;width:3px;height:48px;border-radius:3px;background:#6f87a6;left:2px;top:50%;transform:translateY(-50%)}.artifactPane{display:grid;grid-template-rows:52px 1fr 96px;min-width:0;background:radial-gradient(circle at 50% 0,#172946 0,#0b1424 58%,#07101d 100%)}.artifactHead{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;border-bottom:1px solid var(--line);background:rgba(11,20,36,.92)}.artifactHead strong{font-size:13px}.artifactHead span{font-size:11px;color:var(--muted)}.preview{padding:16px;display:flex;align-items:center;justify-content:center;min-height:0}.slideFrame{width:100%;max-height:100%;object-fit:contain;display:block;border:1px solid #3e5574;border-radius:10px;background:#fff;box-shadow:0 24px 70px rgba(0,0,0,.42)}.artifactRail{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;padding:10px 12px;border-top:1px solid var(--line);background:#0b1424}.artifactCard{display:grid;grid-template-columns:38px 1fr;gap:8px;align-items:center;border:1px solid #314c70;background:#111f35;color:var(--ink);border-radius:10px;padding:8px 9px;text-decoration:none;min-width:0}.artifactCard.active{border-color:#80addf;background:#172c49;box-shadow:inset 0 0 0 1px #80addf}.fileIcon{width:38px;height:38px;border-radius:8px;display:grid;place-items:center;background:#213b60;color:#dceaff;font-size:9px;font-weight:900}.artifactCard.active .fileIcon{background:#346b9f}.fileTitle{display:block;font-size:11px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.fileMeta{display:block;font-size:10px;color:var(--muted);margin-top:2px}@media(max-width:900px){.canvas{grid-template-columns:1fr;overflow:auto}.chatPane{height:48vh}.splitter{display:none}.artifactPane{height:70vh}.top{height:auto;min-height:62px;align-items:flex-start}.toolbar{flex-wrap:wrap;justify-content:flex-end}}
</style>
</head>
<body>
<header class="top"><div class="brand"><div class="brand-title">Thread Canvas</div><div class="brand-sub">Research checkpoint · corrected GPT-2 Small ranking</div></div><div class="toolbar"><a class="btn" href="artifacts/hermes-built-research-deck.pptx" target="_blank" rel="noopener">Download PPTX</a><a class="btn primary" href="artifacts/hermes-built-research-deck.pdf" target="_blank" rel="noopener">Open PDF</a></div></header>
<main class="canvas">
<section class="chatPane" aria-label="Academic discussion"><iframe src="thread-canvas-chat-clean.html" title="Academic discussion"></iframe></section>
<div class="splitter" aria-hidden="true"></div>
<section class="artifactPane" aria-label="Promoted artifacts">
  <div class="artifactHead"><strong>Promoted artifact · opening checkpoint slide</strong><span>rendered from native PowerPoint</span></div>
  <div class="preview"><img class="slideFrame" src="artifacts/hermes-built-research-deck-slide-01.png" alt="GPT-2 Small corrected Linear versus ResNet ranking slide"></div>
  <div class="artifactRail">
    <a class="artifactCard active" href="artifacts/hermes-built-research-deck-slide-01.png" target="_blank" rel="noopener"><span class="fileIcon">SLIDE</span><span><span class="fileTitle">Opening checkpoint</span><span class="fileMeta">Rendered slide · PNG</span></span></a>
    <a class="artifactCard" href="artifacts/hermes-built-research-deck.pptx" target="_blank" rel="noopener"><span class="fileIcon">PPTX</span><span><span class="fileTitle">Editable research deck</span><span class="fileMeta">Native PowerPoint</span></span></a>
    <a class="artifactCard" href="artifacts/hermes-built-research-deck.pdf" target="_blank" rel="noopener"><span class="fileIcon">PDF</span><span><span class="fileTitle">Research deck PDF</span><span class="fileMeta">Rendered and checked</span></span></a>
  </div>
</section>
</main>
</body>
</html>
